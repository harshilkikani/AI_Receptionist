# Current live client — do NOT change id or inbound_number without also
# updating Twilio webhooks for +18449403274.
id: ace_hvac
name: "Ace HVAC & Plumbing"
owner_name: "Mike"     # V8.12.5 — real-business feel: "Mike will call you" > "the owner will call you"
# V7.1 — flipped to ElevenLabs. Falls back to Polly Joanna Neural if
# ELEVENLABS_API_KEY is missing, the public base URL is empty, or the
# render fails for any reason.
tts_provider: elevenlabs
tts_voice_id: "EXAVITQu4vr4xnSDxMaL"   # Rachel
# V8.12.2 — asymmetric model selection, walked back from Multilingual_v2.
#   prewarm_model: Multilingual_v2 was built for narration / expressive
#     content — it stretched vowels ("haaai") on greetings and felt
#     performative. Turbo_v2_5 is positioned as conversational —
#     natural local-business cadence without the production feel.
#   runtime_model: live mid-call renders. Flash for latency.
tts_prewarm_model: "eleven_turbo_v2_5"
tts_runtime_model: "eleven_flash_v2_5"
# V8.12.1 — voice_settings removed entirely. Previous V8.5 + V8.10a
# values (stability=0.40, style=0.30, use_speaker_boost=true) layered
# into an over-shaped "AI trying to sound human" cadence. ElevenLabs
# defaults (stability=0.5, similarity=0.75, no style boost, no speaker
# boost) produce the most natural conversational delivery. To re-tune
# later, ADD this block back — but A/B against the no-settings default
# before assuming any change is an improvement.
# V7.2 — natural disfluency (opt-in). Fires after anti_robot + grounding.
disfluency: true
disfluency_intensity: 0.15
# V8.9b — endpointing fillers. Plays a cached "Mhm —" / "Lemme see —"
# within ~300ms of the caller's speech ending while the LLM runs in a
# background thread. Caller hears the AI "thinking" instead of dead
# air. Opt-in per tenant; falls through to the synchronous path on any
# error condition.
endpointing_fillers: true
owner_email: ""                       # where monthly invoices go (P2). empty = no SMTP send
owner_cell: ""                        # where emergency SMS alerts go (P3). falls back to escalation_phone
timezone: "America/New_York"          # used for owner's end-of-day digest (P4)
inbound_number: "+18449403274"
escalation_phone: ""                  # set via ON_CALL_NUMBER env for now
services: "HVAC, plumbing, furnace repair, AC install, water heater service"
pricing_summary: "Service call $129. AC install $4800-8500 depending on size."
service_area: "Residential, local area"
hours: "Mon-Fri 8am-5pm, emergency 24/7"
emergency_keywords:
  - burst
  - flood
  - flooding
  - leak
  - leaking
  - gushing
  - gas
  - no heat
  - fire
  - smoke
  - carbon monoxide
  - no hot water
plan:
  tier: "starter"
  monthly_price: 297
  included_calls: 250
  included_minutes: 500
  overage_rate_per_call: 0.75
  max_call_duration_seconds: 240
  max_call_duration_emergency: 360
  voice_tier_main: "premium"
  voice_tier_transactional: "flash"
  robocall_gate: false
  sms_max_per_call: 3
integrations:
  calendar: null
  crm: null
default_language: "en"
